kind: Deployment
apiVersion: apps/v1
metadata:
  name: sapact
  labels:
    app: sapact-app
    service: sapact-service
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      service: sapact-service
  template:
    metadata:
      labels:
        app: sapact-app
        service: sapact-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.AKSClusterSAName }}
      containers:
        - name: sapact
          image: "{{ .Values.ACRName }}.azurecr.io/{{ .Chart.Name }}:{{ .Chart.AppVersion }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: sapact-port
              containerPort: 8080
              protocol: TCP
          env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: "ASPNETCORE_ENVIRONMENT"
            value: {{ .Values.environment | quote }}
          - name: "REGION_CODE"
            value: {{ .Values.regioncode | quote }}
          - name: "SAPACT_CONFIGURATION_URL"
            value: {{ .Values.configKeyVault | quote }}
          
      nodeSelector:
        agentpool: platform